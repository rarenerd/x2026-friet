# Friet met Desire — deFEEST X2026
# Frituur-meets-demoscene parodie op Gala's "Freed from Desire". Elke regel
# valt op dezelfde beat als de T7-melodie. Thema: de crew (trots, niet arm),
# de sporthal-compo, soldeerflux & lauwe energiedrank, MAYO (brand voice),
# C64/SID/kunst. Geen byte-armoede — er zijn bytes zat vrij. ;-)
# LET OP bij handmatig typen: alleen a-z A-Z 0-9 spatie , . ! ' / - & renderen;
# géén é/—/etc (worden spaties). Regels < 40 kolommen (anders wrap).

lyrics:
  # Intro
  - {beat: 0.0,  text: "Friet met Desire"}
  - {beat: 4.0,  text: "deFEEST - X2026"}
  - {beat: 8.0,  text: "De hapkar staat buiten"}

  # Couplet 1 — "My love has got no money..." -> onze crew is NIET arm
  - {beat: 21.5, text: "Mijn crew die heeft geen shaders"}
  - {beat: 25.5, text: "maar wel een rasterrol"}
  - {beat: 29.5, text: "Mijn crew die heeft geen sponsors"}
  - {beat: 33.5, text: "maar wel een bak kabaal"}
  - {beat: 37.5, text: "Twintig man, een verlengsnoer"}
  - {beat: 41.5, text: "nog een laatste fix"}
  - {beat: 45.5, text: "vlak voor de compo ingestuurd"}
  - {beat: 49.5, text: "en de frituur draait door"}

